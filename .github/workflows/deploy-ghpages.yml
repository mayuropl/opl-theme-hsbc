# Legacy: deploys to gh-pages branch via angular-cli-ghpages.
# If you use build-and-deploy.yml with Pages source "GitHub Actions", disable this workflow
# (Settings → Actions) to avoid two deploy methods conflicting.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build:github

      - name: Deploy to GitHub Pages
        run: npm run deploy:github
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}




