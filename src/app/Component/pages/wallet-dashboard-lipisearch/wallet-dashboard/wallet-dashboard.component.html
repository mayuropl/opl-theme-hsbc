                <!-- Search By Button with Menu -->

                     Search by <mat-icon class="ml-2 mr-0">unfold_more</mat-icon>
                </button>

                <!-- Search By Menu -->
                <mat-menu #searchByopt="matMenu" class="filter_option_menu filter_option_menu_new">

                    <!-- Main Menu View -->
                    <ng-container *ngIf="!activeFilterMenu">
                        <h3 class="title_menu" (click)="$event.stopPropagation()">
                            <span class="left_side">
                            Search Options
                            <button mat-icon-button color="primary" class="ref_icon" (click)="resetAllFilters()">
                                <i class="fi fi-br-refresh red_text"></i>
                            </button>
                            </span>
                            <button mat-icon-button type="button" (click)="searchByTrigger.closeMenu()">
                                <i class="fi fi-br-cross-small"></i>
                            </button>
                        </h3>

                        <ng-container *ngFor="let opt of searchByOptionsTopBar; let i = index">
                            <button mat-menu-item class="mr-0 pr-1 no_wrap"
                                (click)="openFilterView(opt, i, $event)">
                                <!-- (click)="openFilterView(opt, i, $event)" [style.display]="opt.key === 'RM' ? 'none' : ''"> -->
                                <span class="menu_text">
                                    <i [ngClass]="getSearchByIcon(opt.key)"></i> {{ opt.key }}
                                </span>
                                <span class="right_value">
                                    <span class="filter_num">{{ getSelectedCount(opt.filter_name) }}</span>
                                    <i class="fas fa-chevron-right ml-2"></i>
                                </span>
                            </button>
                        </ng-container>
                    </ng-container>

                    <!-- Filter Detail View -->
                    <ng-container *ngIf="activeFilterMenu && selectedFilterOption">
                        <div class="filter_menuBar filter_menuBarNew" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
                            <h3 class="title_menu">
                                <button mat-icon-button (click)="goBackToMenu($event)" class="back_btn mr-1">
                                    <i class="fi fi-rr-arrow-small-left"></i>
                                </button>
                                {{ activeFilterMenu }}
                                <button mat-icon-button class="close_btn ml-auto" (click)="searchByTrigger.closeMenu()">
                                    <i class="fi fi-br-cross-small"></i>
                                </button>
                            </h3>

                            <div class="pos_rel" [ngClass]="{'subloaderShowing': isLoadingSearchBy}">

                                        </div>
                                    </div>
                                </div>

                                <div class="filter_searchbox" *ngIf="searchByDataHistory[selectedFilterOption?.dataset_id]">
                                    <div class="filter_searchbox_wrapper">
                                        <i class="fas fa-search searchbox_Icn"></i>
                                        <input type="text" placeholder="Search" class="searchbox_input"
                                            [(ngModel)]="searchByDataHistory[selectedFilterOption.dataset_id].searchValue"
                                            (ngModelChange)="onSearchChange($event, selectedFilterOption.dataset_id, selectedFilterOption.dataset_name)"/>
                                    </div>
                                </div>

                                <div class="filter_details checkbox_lists"
                                    (scroll)="onScroll($event, selectedFilterOption?.dataset_id, selectedFilterOption?.dataset_name, selectedFilterOption?.filter_name)">
                                    <mat-checkbox *ngFor="let item of dependantFilters"
                                        [checked]="selectedItemsMap[selectedFilterOption?.filter_name]?.includes(item.value)"
                                        (change)="onSelectField($event, selectedFilterOption?.filter_name, item.value, selectedFilterOption?.dataset_id)">
                                        {{ item.key }}
                                    </mat-checkbox>
                                </div>

                                <div class="filter_action">
                                    <button mat-flat-button color="primary" class="no_wrap" (click)="applyFilters()">Apply</button>
                                    <button mat-stroked-button class="btn_design white_bg no_wrap" color="primary"
                                        (click)="resetFilters(selectedFilterOption?.dataset_id, selectedFilterOption?.dataset_name, selectedFilterOption?.filter_name)">

                    </ng-container>

                </mat-menu>

            </div>
            <mat-tab-group mat-align-tabs="start" class="tabs-design tabs-design2">
                <mat-tab>
                    <ng-template mat-tab-label>
                        Lipisearch Lending Wallet
                    </ng-template>
                    <mat-card-content>
                        <app-pr-top-filter [filters]="filters" [filtersC]="filtersC" [datasetsC]="datasetsC" [showComparison]="showComparison" [restoredFiltersC]="restoredFiltersC" [restoredFilters]="restoredFilters" [searchViewBySelectionRestored]="searchViewBySelectionRestored" [searchViewByOptionsRestored]="searchViewByOptionsRestored" (filtersApplied)="handleAppliedFilters($event)"
                            (filtersAppliedC)="handleAppliedFiltersC($event)" (resetAppliedC)="handleAppliedResetC($event)" #prTopFilter (showSummaryChange)="onSummaryChange($event)"
                            (viewByChanged)="onViewByChanged($event)" (filtersStateChanged)="onFiltersStateChanged($event)" (searchViewBySelectionChanged)="onSearchViewBySelectionChanged($event)"
                            (searchViewByOptionsChanged)="onSearchViewByOptionsChanged($event)"
                            (clearRestoredFilters)="onClearRestoredFilters()"></app-pr-top-filter>
                        <ng-container *ngIf="!showComparison">
                            <app-pr-lending-analytics [lendingAnalysis]="lendingAnalysis" [previousLendingAnalysis]="previousLendingAnalysis"
                            [isLoadingFromParent]="isLoadingLendingAnalysis"
                            (unitChanged)="onUnitChanged($event)" [selectedUnit]="selectedUnit"></app-pr-lending-analytics>

                        <div class="wallet_chart_main mt-4">
                            <div class="card_box">
                                <app-trends-lending-chart [trendsLendingChartsData]="trendsLendingChartsData" [dateOfReportMap]="dateOfReportMap"
                                    [selectedUnit]="selectedUnit" [isLoadingFromParent]="isLoadingTrendsLending"></app-trends-lending-chart>
                            </div>
                            <div class="card_box">
                                <app-segment-level-chart [trendsLendingChartsData]="trendsLendingChartsData" [latestDateOfReportShow]="latestDateOfReportShow" [dateOfReportMap]="dateOfReportMap"
                                    [segmentLevelOppData]="segmentLevelOppData" [selectedUnit]="selectedUnit" [isLoadingFromParent]="isLoadingSegmentLevel" [hasFiltersApplied]="hasFiltersApplied">
                                </app-segment-level-chart>
                            </div>
                        </div>
                        <app-product-level-chart [productLevelOppData]="productLevelOppData" [productLevelChartData]="productLevelChartData" [customerLevelOppData]="customerLevelOppData"
                            [customerLevelChartData]="customerLevelChartData" [selectedUnit]="selectedUnit" [isLoadingFromParent]="isLoadingProductLevel" [isLoadingProductLevelChart]="isLoadingProductLevelChart"
                            (customerNameChange)="onCustomerSelected($event)" [customerWiseProductsData]="customerWiseProductsData" [isLoadingCustomerLevelChart]="isLoadingCustomerLevelChart"
                             (pageChangeCustomerLevel)="onPageChangeCustomerLevel($event)" [totalRecordsCustomer]="totalRecordsCustomer"
                             (pageChangeProductLevel)="onFetchProductLevelCustomers($event)" (searchSortEvent)="onProductOrCusomerLvlSortSearch($event)"
                             [totalRecordsProduct]="totalRecordsProduct" [productWiseCustomerData]="productWiseCustomerData"
                             [totalRecordsProductParent]="totalRecordsProductLevel" [totalRecordsCustomerProducts]="totalRecordsCustomerWiseProducts"
                             (pageChangeProductParent)="getProductLevelOppCharts($event)" (pageChangeCustomerProducts)="getCustomerLevelWiseProduct($event)"
                             (emitExcelDownloadProductLevel)="emitExcelDownloadProductLevel($event)" [latestDateOfReportShow]="latestDateOfReportShow"
                             [filtersApplied]="appliedFilters" [hasFiltersApplied]="hasFiltersApplied"
                             [filterOptions]="filters" [filtersff]="filtersff" [filtersffNavigateFinale]="filtersffNavigateFinale" [dataSetIdSCT]="dataSetIdSCT"
                             [restoredTableLevel]="restoredTableLevel"
                             (tableLevelRestored)="restoredTableLevel = null"
                             (productClicked)="onProductBarClicked($event)" (resetProductChart)="onResetDashboard()"
                            (customerLevelChartClicked)="onCustomerLevelChartClicked($event)">
                        </app-product-level-chart>
                        </ng-container>
                        <ng-container *ngIf="showComparison && clickOnApply">
                            <app-pr-insights-analysis [lendingAnalysisC]="lendingAnalysisC" (unitChangedC)="onUnitChangedC($event)" [selectedUnitC]="selectedUnitC"
                            [dateOfReportMap]="dateOfReportMap" [latestDateOfReport]="latestDateOfReport" [selectedDateOfReport]="selectedDateOfReport"
                            [isLoadingFromParentC]="isLoadingLendingAnalysisC" ></app-pr-insights-analysis>
                            <app-comparison-analysis [firstLevelDataC]="firstLevelDataC" [totalRecordsFirstLevel]="totalRecordsFirstLevel"
                            [selectedViewBy]="selectedViewByShow" (pageChangeFirstLevel)="onFetchFirstLevelView($event)"
                            [secendLevelViewData]="secendLevelViewData" (pageChangeSecondLevel)="onFetchSecendLevelView($event)" [totalRecordsSecondLevel]="totalRecordsSecondLevel"
                            [filtersffC]="filtersffC"  [filtersffCFirstLevel]="filtersffCFirstLevel" [calculationOn]="calculationOn" [selectedUnitC]="selectedUnitC" [isLoadingFromParent]="isLoadingComparisionFL"
                            [isFilterApplied]="isFilterApplied" [dataSetIdCRQ]="dataSetIdCRQ" [dataSetIdCTRQ]="dataSetIdCTRQ" (emitComaprisonExcelDownload)="emitComaprisonExcelDownload($event)"
                            [latestDateOfReportShowCom]="latestDateOfReportShowCom" [selectedDateOfReportShowCom]="selectedDateOfReportShowCom" [hasFiltersApplied]="hasFiltersApplied"
                            [filterOptions]="filtersC" [searchViewBySelection]="searchViewBySelection" [searchViewByOptions]="searchViewByOptions"></app-comparison-analysis>
                        </ng-container>
                        </mat-card-content>
                </mat-tab>

                    </mat-card-content>
                </mat-tab> -->
            </mat-tab-group>
        </div>
    </div>
</div>
