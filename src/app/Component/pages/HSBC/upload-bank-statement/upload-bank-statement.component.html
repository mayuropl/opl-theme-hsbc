      </div>
      <ng-container formArrayName="uploads">
        <div *ngFor="let group of uploads.controls; let i = index" [formGroupName]="i" class="mb-4">
          <div class="page_Details">
               <mat-card class="box_design with_padding">
                <div class="upload_bank_mange">
                  <fieldset [disabled]="disableFields(i)">
                    <div class="input_field">
                      <mat-form-field appearance="outline" class="full-width">
                        <mat-label>Select Bank name</mat-label>

                        <input type="text"
                               matInput
                               placeholder="Bank"
                               [matAutocomplete]="auto"
                               formControlName="bank"
                               required>

                        <mat-autocomplete #auto="matAutocomplete" (optionSelected)="onBankSelected($event, i)">
                          <mat-option *ngFor="let bank of filteredOptionsList[i] | async" [value]="bank.id">
                            {{ bank.bankName }}
                          </mat-option>
                        </mat-autocomplete>

                        <!-- Optional: Manual dropdown icon -->
                        <button matSuffix mat-icon-button tabindex="-1">
                          <mat-icon>arrow_drop_down</mat-icon>
                        </button>
                      </mat-form-field>
                    </div>

                  </fieldset>
                  <fieldset [disabled]="disableFields(i)">
                    <div class="custom_month_picker">
                      <div class="form_box">
                        <input formControlName="fromMonth" autocomplete="off" class="form-control" name="date"
                               placeholder="MM/YYYY"
                               bsDatepicker   [bsConfig]="{ dateInputFormat: 'MM/YYYY',
                               maxDate: uploads.at(i).get('toMonth')?.value ? uploads.at(i).get('toMonth')?.value : maxDate }"
                               (onShown)="onOpenCalendar($event)">
                        <i class="fas fa-calendar-alt"></i>
                      </div>
                    </div>
                  </fieldset>
                  <fieldset [disabled]="disableFields(i)">
                    <div class="custom_month_picker">
                      <div class="form_box">
                        <input formControlName="toMonth" autocomplete="off" class="form-control" name="date"
                               bsDatepicker   [bsConfig]="{ dateInputFormat: 'MM/YYYY', maxDate: maxDate ,minDate: uploads.at(i).get('fromMonth')?.value }" placeholder="MM/YYYY"
                               (onShown)="onOpenCalendar($event)" >
                        <i class="fas fa-calendar-alt"></i>
                      </div>
                    </div>
                  </fieldset>
                  <fieldset>
                    <input type="file"  accept="application/pdf" hidden #fileInput (change)="onFileSelected($event, i)" multiple/>
                    <button mat-flat-button class="btn_design mat-primary" (click)="openFileDialog(fileInput)">
                      <i class="fas fa-arrow-up mr-2" ></i>Upload File
                    </button>
                  </fieldset>
                  <div class="delete_Icon">
                    <mat-icon class="blckTxt cursor_pointer ml-2" style="margin-left: 8px; margin-top: 13px;"
                              *ngIf="uploads.at(i).get('files')?.value?.length <=0"    (click)="removeUploadGroup(i,uploads.at(i).get('status')?.value,uploads.at(i).get('accId')?.value)">cancel</mat-icon>
                  </div>

                </div>
              </mat-card>
                <mat-card class="box_design with_padding mt-2" *ngIf="uploads.at(i).get('files')?.value?.length">
                <div class="files-list">
                  <h2 class="file_list">{{ uploads.at(i).get('bank')?.value || 'Bank' }} Uploaded File <span class="bedge">{{uploads.at(i).get('files')?.value?.length}}</span></h2>
                  <div class="right_side">
                    <span> <i class="fas fa-info-circle red_text mr-1" matTooltip="{{uploads.at(i).get('message')?.value}}" *ngIf="uploads.at(i).get('status')?.value === 2"></i>
                       </span>
                    <span *ngIf="uploads.at(i).get('status')?.value === 1" class="green_badge suess_text mr-2"><i class="fas fa-check-circle mr-1"></i>Success</span>
                    <span *ngIf="uploads.at(i).get('status')?.value === 0" class="orange_badge pending_text mr-2"><i class="fas fa-check-circle mr-1"></i>Pending</span>
                    <span *ngIf="uploads.at(i).get('status')?.value === 2" class="lightred_badge fail_text mr-2"><i class="fas fa-check-circle mr-1"></i>Failed</span>
                    <button [disabled]="uploads.at(i).get('status')?.value === 1 || uploads.at(i).get('status')?.value === 0 || !uploads.at(i).valid" mat-flat-button class="btn_design green_btn ln_40" (click)="submit(i)">Fetch</button>
                    <button mat-flat-button class="btn_design mat-primary ln_40 ml-2" (click)="removeUploadGroup(i,uploads.at(i).get('status')?.value,uploads.at(i).get('accId')?.value)">
                      Remove
                    </button>
                  </div>

                </div>
                <div class="files_list_Grp tableResponsive">
                  <div *ngFor="let file of uploads.at(i).get('files')?.value; let j = index" class="singlefile_View">
                    <div class="fileProgress">
                      <div class="FileName_IconUpload">
                        <span class="number_list">{{ j + 1 }}</span>
                        <div class="file_Icon green_text">
                          <mat-icon>description</mat-icon>
                        </div>
                        <div class="info">
                          <h4 class="fileName mb-1">{{ file.file.name }}</h4>
                          <div class="Progreebar">
                            <mat-progress-bar [value]="file.progress"></mat-progress-bar>
                          </div>
                        </div>
                        <div class="password_View">
                          <mat-form-field>
                            <input matInput type="password" placeholder="Password"
                                   [value]="uploads.at(i).get('files').value[j].password"
                                   (input)="uploads.at(i).get('files').value[j].password = $event.target.value">
                          </mat-form-field>

                        </div>
                        <div class="delete_Icon">
                          <mat-icon class="primary" class="lightGreentxt">check_circle</mat-icon>
                          <mat-icon class="blckTxt"  [class.disabled]="uploads.at(i).get('status')?.value === 1" (click)="removeFile(i, j,uploads.at(i).get('status')?.value ,uploads.at(i).get('files').value[j]?.id )">cancel</mat-icon>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </mat-card>
           </div>
        </div>
      </ng-container>
      <div class="Btn_Common_Grp __Btn_Group mt-4 jc-end">
        <button mat-stroked-button color="secondary" class="btn_design" [disabled]="!addMoreButtonDisable()" (click)="addUploadGroup()"><i class="fas fa-plus-circle mr-1"></i> Add Another Bank Account</button>
        <button [disabled]="submitDisabled()" (click)="submitAccounts()" type="button" mat-flat-button color="primary">
          Submit
        </button>
      </div>
    </form>
  </div>
