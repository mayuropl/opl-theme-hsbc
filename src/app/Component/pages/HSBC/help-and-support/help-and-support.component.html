            <!-- All Files -->
            <div class="all-files-section">
                <h2 class="section-title">All Files</h2>
                <div class="files-grid">
                    <!-- Card 1: PDF -->
                    <div class="file-card" *ngFor="
  let file of (
    showAllFiles
      ? bulkUploadHistory
      : (bulkUploadHistory | slice:0:4)
  )
">
                        <div class="file-card-header">
                            <div class="file-info">
                                <span class="file-type-badge" [ngClass]="getFileType(file.fileName)">
                                    <i *ngIf="getFileType(file.fileName) === 'pdf'" class="fi fi-sr-file-pdf"></i>
                                    <i *ngIf="getFileType(file.fileName) === 'mp4'" class="fi fi-sr-mp4-file"></i>
                                    <i *ngIf="getFileType(file.fileName) === 'doc' || getFileType(file.fileName) === 'docx'" class="fi fi-sr-file-word"></i>
                                    <i *ngIf="getFileType(file.fileName) === 'ppt' || getFileType(file.fileName) === 'pptx'" class="fi fi-sr-file-powerpoint"></i>
                                    <i *ngIf="getFileType(file.fileName) === 'xls' || getFileType(file.fileName) === 'xlsx'" class="fi fi-sr-file-excel"></i>
                                    <i *ngIf="!['pdf','mp4','doc','docx','ppt','pptx','xls','xlsx'].includes(getFileType(file.fileName))" class="fi fi-sr-document"></i>
                                </span>
                               <div class="file-info-text">
                                    <span class="file-name">{{ file.fileName }}</span>
                                    <p class="file-date"> {{ file.createdDate | date:'dd MMM yyyy, HH:mm' }}</p>
                               </div>
                            </div>
                            <div ngbDropdown container="body">
                                <button
                                    ngbDropdownToggle
                                    mat-icon-button
                                    class="matIcon grey_icn" 
                                    type="button">
                                    <mat-icon>more_vert</mat-icon>
                                </button>
                            
                                <div ngbDropdownMenu class="dropdown-menu NP_Drop_Hover">
                                    <button ngbDropdownItem (click)="viewFile(file)">
                                        <i class="fas fa-eye mr-1"></i> View
                                    </button>
                                    <button ngbDropdownItem (click)="download(file)">
                                        <i class="fas fa-download mr-1"></i> Download
                                    </button>
                                    <button ngbDropdownItem  (click)="deleteFile(file.referenceId)" *ngIf="isActionAvail(constants.PageActions.DELETE)">
                                        <i class="fas fa-trash mr-1"></i> Delete
                                    </button>
                                </div>
                            </div>
                        </div>
