<h2 mat-dialog-title>Request Limit</h2>
<mat-dialog-content>
  RM can request <b>500 customers</b> in a single request.
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="onProceed()">Proceed</button>
</mat-dialog-actions>
