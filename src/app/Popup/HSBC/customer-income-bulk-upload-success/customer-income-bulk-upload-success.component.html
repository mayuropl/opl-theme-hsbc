<div class="popup_design max-500">
    <a class="modal_closeicn_btn" href="javascript:void(0)">
      <mat-icon (click)="closePopup()" cdkFocusInitial>close</mat-icon>
    </a>
    <div class="pop_up_container">
      <div class="popup_header" mat-dialog-title>
        <h3>Customer Income Bulk Data File Uploaded</h3>
      </div>
      <mat-dialog-content>
        <div class="popup_body">
          <div class="list_table_design">
            <div class="list_row">
              <span><span class="grey_badge">{{data.totalEntry}}</span></span>
              <span>Total Customer Income Data Uploaded</span>
            </div>
            <div class="list_row">
              <span><span class="green_badge">{{data.successfullEntry}}</span></span>
              <span>Successfully Uploaded Customer Income Data</span>
            </div>
            <div class="list_row">
              <span><span class="lightred_badge">{{data.failEntry}}</span></span>
              <span>Failed Uploaded Customer Income Data</span>
            </div>
          </div>
        </div>
      </mat-dialog-content>
      <mat-dialog-actions class="d-flex justify-content-center popup_actions_btns">
        <button mat-flat-button color="primary" (click)="procced()">Proceed <mat-icon
            class="ml-1">arrow_forward</mat-icon></button>
      </mat-dialog-actions>
    </div>
  </div>
