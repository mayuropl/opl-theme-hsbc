<section class="popup_design max-900 HSBC_Common_Pages team_structure_popup pb-0">
    <div class="popup_header" mat-dialog-title>
        <a class="modal_closeicn_btn" href="javascript:void(0)" (click)="onClose()">
            <mat-icon>close</mat-icon>
        </a>
        <h3>Team Structure</h3>
        <div class="right_fields">
            <div class="input_field">
                <mat-form-field appearance="outline" class="w-auto">
                    <mat-select placeholder="RM Role" [disabled]="isLoading" [(value)]="selectedRmRole" (selectionChange)="onRmRoleChange($event.value)">
                        <mat-option *ngFor="let role of rmRoleConfigs" [value]="role.roleCode">
                            {{ role.roleName }}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
            <div class="input_field gray_input ml-2">
                <mat-form-field appearance="outline" class="w-auto">
                    <input type="text" placeholder="Search" matInput [(ngModel)]="searchQuery" (ngModelChange)="onSearchChange($event)">
                    <em matSuffix class="fas fa-search searchbox_Icn mr-2"></em>
                </mat-form-field>
            </div>
        </div>
    </div>

                                        alt="">

                            </div>

                        </div>
                    </div>
                </div>
                <app-no-data-found message="No team members found" *ngIf="!isLoading && (!hasVisibleNodes || filteredTree.length === 0)"></app-no-data-found>
                <ul class="team_tree" *ngIf="!isLoading && hasVisibleNodes && filteredTree.length > 0">
                    <ng-container *ngFor="let node of filteredTree">
                        <ng-container *ngTemplateOutlet="treeNode; context: { $implicit: node, level: 0 }"></ng-container>
                    </ng-container>
                </ul>

                <ng-template #treeNode let-node let-level="level">
                    <li *ngIf="node.visible" class="team_tree_item" [ngClass]="'level_' + level"
                        [class.expanded]="node.expanded" [class.collapsed]="!node.expanded">
                        <div class="team_row" [class.main_row]="level === 0" (click)="toggleExpand(node)">
                            <span class="chevron" *ngIf="hasChildren(node)"
                                  [class.expanded]="node.expanded" [class.collapsed]="!node.expanded">
                                <mat-icon>{{ node.expanded ? 'expand_more' : 'chevron_right' }}</mat-icon>
                            </span>
                            <span class="chevron_placeholder" *ngIf="!hasChildren(node)"></span>
                            <mat-checkbox [checked]="node.selected" (click)="toggleSelection(node, $event)"></mat-checkbox>
                            <span class="member_name">{{ node.name }}</span>
                            <span class="report_badge" *ngIf="node.reporteeCount > 0">{{ node.reporteeCount }}</span>
                            <span class="customer_count">No. of Customer : <span class="customer_badge">{{ node.customerCount }}</span></span>
                        </div>

                        <ul class="team_tree_children" *ngIf="hasChildren(node) && node.expanded">
                            <ng-container *ngFor="let child of node.children">
                                <ng-container *ngTemplateOutlet="treeNode; context: { $implicit: child, level: level + 1 }"></ng-container>
                            </ng-container>
                        </ul>
                    </li>
                </ng-template>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions class="d-flex justify-content-end popup_actions_btns">
            <button mat-flat-button color="primary" (click)="onApply()" [disabled]="!hasSelection">Apply</button>
            <button mat-stroked-button color="primary" (click)="onReset()">Reset</button>
        </mat-dialog-actions>
    </div>
</section>
